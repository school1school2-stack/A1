<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الاختبار - الدخول العشوائي</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f0f2f5; 
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
        }
        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { background-color: #218838; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك</h1>
        <p>الرجاء إدخال اسمك الثلاثي لبدء الاختبار</p>
        
        <input type="text" id="studentName" placeholder="اكتب اسمك هنا..." required>
        
        <br>
        
        <button onclick="startTest()">دخول النموذج</button>
    </div>

    <script>
        function startTest() {
            const nameInput = document.getElementById('studentName').value.trim();

            // التأكد من أن الطالب أدخل اسمه
            if (nameInput === "") {
                alert("من فضلك، يجب كتابة الاسم أولاً قبل الدخول!");
                return;
            }

            // قائمة النماذج الأربعة الخاصة بك
            const urls = [
                "https://school1school2-stack.github.io/Vvv/",
                "https://school1school2-stack.github.io/Vvv2/",
                "https://school1school2-stack.github.io/Vvv3/",
                "https://school1school2-stack.github.io/Vvv4/"
            ];

            // اختيار نموذج عشوائي
            const randomIndex = Math.floor(Math.random() * urls.length);
            const selectedUrl = urls[randomIndex];

            // توجيه الطالب للنموذج
            alert("بالتوفيق يا " + nameInput + "، سيتم توجيهك الآن لنموذجك.");
            window.location.href = selectedUrl;
        }
    </script>

</body>
</html>
